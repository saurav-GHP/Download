<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TPS Demo Launcher</title>

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:monospace;
text-align:center;
}

/* LOGIN */

#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.loginBox{
border:1px solid #00ff9c;
padding:30px;
box-shadow:0 0 15px #00ff9c;
}

input{
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
padding:10px;
margin:10px;
}

button{
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
padding:10px 20px;
cursor:pointer;
}

/* MAIN */

#main{
display:none;
padding:20px;
}

/* DOWNLOAD BUTTON */

.download{
border:2px solid #00ff9c;
padding:15px 30px;
display:inline-block;
cursor:pointer;
margin-top:20px;
}

.download:hover{
background:#00ff9c;
color:black;
}

/* HACK SCREEN */

#hackScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9c;
overflow:hidden;
z-index:2000;
}

#terminal{
position:absolute;
top:20px;
left:20px;
text-align:left;
}

#progressBox{
position:absolute;
top:120px;
left:20px;
width:80%;
height:20px;
border:1px solid #00ff9c;
}

#progress{
height:100%;
width:0%;
background:#00ff9c;
}

/* BINARY */

#binary{
position:absolute;
top:160px;
left:0;
width:100%;
height:75%;
overflow:auto;
text-align:left;
white-space:pre;
padding:10px;
font-size:12px;
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<div class="loginBox">

<h2>Secure Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>Hint: admin / 1234</p>

</div>

</div>

<!-- MAIN PAGE -->

<div id="main">

<h1>TPS DEMO GAME</h1>
<p>Modified by Team Saurav</p>

<h3>Team</h3>

<p>Saurav Kushwaha</p>
<p>Kartabya</p>
<p>Sujan</p>
<p>Krishna</p>
<p>Aniyug</p>

<p>Teacher: Mr Shambhu Sir</p>

<h3>Game Info</h3>

<p>Version 1.0</p>
<p>Engine Godot</p>
<p>Size 352 MB</p>
<p>Status Under Development</p>

<div class="download" onclick="startHack()">Install Game</div>

</div>

<!-- HACK SCREEN -->

<div id="hackScreen">

<div id="terminal"></div>

<div id="progressBox">
<div id="progress"></div>
</div>

<div id="binary"></div>

</div>

<script>

/* LOGIN */

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){

document.getElementById("loginScreen").style.display="none";
document.getElementById("main").style.display="block";

}
else{

alert("Wrong username or password");

}

}

/* HACK SCREEN */

function startHack(){

document.getElementById("hackScreen").style.display="block";

let terminal=document.getElementById("terminal");

let messages=[
"ACCESSING SERVER...",
"AUTHORIZATION SUCCESS",
"ACCESS GRANTED",
"DECRYPTING FILES...",
"CONNECTING DOWNLOAD SERVER..."
];

let i=0;

let type=setInterval(function(){

if(i<messages.length){

terminal.innerHTML+=messages[i]+"<br>";
i++;

}
else{

clearInterval(type);
startProgress();

}

},800);

/* BINARY STREAM */

let binary=document.getElementById("binary");

setInterval(function(){

let line="";

for(let i=0;i<100;i++){

line+=Math.random()>0.5?"1":"0";

}

binary.innerText+=line+"\n";

/* auto scroll */

binary.scrollTop=binary.scrollHeight;

/* reset after large */

if(binary.innerText.length>7000){

binary.innerText="";

}

},30);

}

/* PROGRESS */

function startProgress(){

let bar=document.getElementById("progress");

let p=0;

let loading=setInterval(function(){

p++;

bar.style.width=p+"%";

if(p>=100){

clearInterval(loading);
downloadGame();

}

},70);

}

/* DOWNLOAD */

function downloadGame(){

let link=document.createElement("a");

link.href="https://github.com/godotengine/tps-demo/archive/90f2e38d7b5cf9e6fd0b788d0da1df4b84d49269.zip";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}

</script>

</body>
</html>
